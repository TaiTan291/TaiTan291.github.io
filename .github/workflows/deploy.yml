name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Node24を今すぐ使う（警告対策）
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    timeout-minutes: 30
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6  # ← v4→v6に更新（Node24対応済み）

      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Build with Trunk
        run: nix develop --command trunk build --release --public-url "${GITHUB_REPOSITORY#*/}"

      - name: Copy index.html to 404.html
        run: cp dist/index.html dist/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v5  # Node24版が出たらv6等に上げる

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3  # 同上

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4  # 同上
